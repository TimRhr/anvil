# =============================================================================
# ansible.cfg — Zentrale Ansible-Konfiguration für Anvil
#
# Anvil läuft im Pull-Modell LOKAL auf dem Zielserver (connection: local).
# Es wird kein klassisches Inventory benötigt — site.yml zielt auf localhost.
# =============================================================================

[defaults]
roles_path          = roles
# Kein festes collections_path: auf dem Ziel werden die vom apt-Paket "ansible"
# mitgelieferten (kompatiblen) Collections genutzt. In CI wird der Pfad per
# ANSIBLE_COLLECTIONS_PATH auf ./collections gesetzt.
inventory           = inventory.ini
host_key_checking   = False
retry_files_enabled = False
# YAML-formatierte Ausgabe über das eingebaute default-Callback.
# (Das frühere community.general.yaml-Callback wurde in community.general 12
#  entfernt; result_format wird von ansible-core <2.13 harmlos ignoriert.)
stdout_callback     = default
result_format       = yaml
interpreter_python  = auto_silent
gathering           = smart
forks               = 1
deprecation_warnings = True
localhost_warning   = False

# Vault — Passwort-Datei (aktivieren, sobald .vault_pass angelegt ist).
# bootstrap.sh setzt --vault-password-file dynamisch, wenn vorhanden.
# vault_password_file = .vault_pass

[privilege_escalation]
become              = True
become_method       = sudo
become_ask_pass     = False
