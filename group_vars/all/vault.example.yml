---
# =============================================================================
# group_vars/all/vault.example.yml — Vorlage für verschlüsselte Secrets
#
# So einrichten:
#   cp group_vars/all/vault.example.yml group_vars/all/vault.yml
#   $EDITOR group_vars/all/vault.yml          # echte Werte eintragen
#   ansible-vault encrypt group_vars/all/vault.yml
#
# Optional Vault-Passwort in ./.vault_pass ablegen (chmod 600) — bootstrap.sh
# nutzt es dann automatisch. .vault_pass NIEMALS committen!
# =============================================================================

# --- ntfy-Benachrichtigungen --------------------------------------------------
# Basis-URL des ntfy-Servers (ohne abschließenden Slash), z.B. https://ntfy.sh
# oder deine self-hosted Instanz.
vault_ntfy_server: "https://ntfy.example.com"
# ntfy-Topic, an das gepusht wird (frei wählbar — schwer zu erraten wählen!).
vault_ntfy_topic: "anvil-alerts-xxxxxxxx"
# Optionaler Access-Token (tk_…) für zugriffsgeschützte Topics. Leer lassen,
# wenn das Topic öffentlich/ohne Auth erreichbar ist.
vault_ntfy_token: ""

# --- GRUB-Bootloader-Passwort (nur wenn enable_grub_password=true) ------------
# Klartext-Passwort; Anvil erzeugt daraus den PBKDF2-Hash für grub.cfg.
vault_grub_password: "EinStarkesGrubPasswort!"

# --- Wazuh-Agent-Registrierungspasswort (nur siem_provider=wazuh, optional) ----
# Nur nötig, wenn der Wazuh-Manager authd mit Passwort verlangt. Sonst leer/auskommentiert.
# vault_wazuh_registration_password: "GeheimesEnrollPW"

# --- Admin-Passwort-Hash (Crown-Jewels-Posture, sudo PR-2) --------------------
# Wird benötigt, wenn admin_sudo_nopasswd=false (Default) in der crown_jewels-
# Posture. Erzeuge den Hash mit: mkpasswd -m sha-512
# (aus der whois/postfix-Paketfamilie). Leer lassen, wenn NOPASSWD aktiv ist.
# admin_password_hash: "$6$xxxxxxxx..."
