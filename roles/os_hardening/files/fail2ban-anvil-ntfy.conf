# Anvil — fail2ban-Action: Ban/Unban via ntfy melden
[Definition]
actionstart =
actionstop =
actioncheck =
actionban = /usr/local/bin/anvil-notify --priority 4 --title "fail2ban: IP gebannt" "Jail <name>: <ip> wurde gebannt (Treffer: <failures>)."
actionunban = /usr/local/bin/anvil-notify --priority 3 --title "fail2ban: Ban aufgehoben" "Jail <name>: <ip> ist wieder freigegeben."

[Init]
name = default
