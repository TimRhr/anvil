---
- name: "Auditd | Regelwerk deployen"
  ansible.builtin.template:
    src: audit-anvil.rules.j2
    dest: /etc/audit/rules.d/anvil.rules
    owner: root
    group: root
    mode: "0640"
  notify:
    - Load audit rules
    - Restart auditd

- name: "Auditd | Log-Retention in auditd.conf setzen"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: "^{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: "max_log_file", value: "50" }
    - { key: "num_logs", value: "10" }
    - { key: "max_log_file_action", value: "keep_logs" }
    - { key: "space_left_action", value: "email" }
    - { key: "admin_space_left_action", value: "halt" }
    - { key: "disk_full_action", value: "halt" }
  loop_control:
    label: "{{ item.key }}"
  notify: Restart auditd

- name: "Auditd | Dienst aktivieren"
  ansible.builtin.systemd_service:
    name: auditd
    enabled: true
    state: started
  when: not ansible_check_mode
