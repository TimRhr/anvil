---
- name: "Auditd | auditd-Paket sicherstellen (self-contained)"
  ansible.builtin.apt:
    name: auditd
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: "Auditd | Regelverzeichnis sicherstellen"
  ansible.builtin.file:
    path: /etc/audit/rules.d
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: "Auditd | Hauptkonfiguration deployen (vollständig, deterministisch)"
  ansible.builtin.template:
    src: auditd.conf.j2
    dest: /etc/audit/auditd.conf
    owner: root
    group: root
    mode: "0640"
  notify: Restart auditd

- name: "Auditd | Regelwerk deployen"
  ansible.builtin.template:
    src: audit-anvil.rules.j2
    dest: /etc/audit/rules.d/anvil.rules
    owner: root
    group: root
    mode: "0640"
  notify:
    - Load audit rules
    - Restart auditd

- name: "Auditd | Dienst aktivieren"
  ansible.builtin.systemd_service:
    name: auditd
    enabled: true
    state: started
  when: not ansible_check_mode
