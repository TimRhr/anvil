---
- name: "Updates | Periodische Updates aktivieren (20auto-upgrades)"
  ansible.builtin.copy:
    src: 20auto-upgrades
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"

- name: "Updates | Anvil-Policy für unattended-upgrades"
  ansible.builtin.template:
    src: 51anvil-unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/51anvil-unattended-upgrades
    owner: root
    group: root
    mode: "0644"

- name: "Updates | Gotify-Meldungsskript installieren"
  ansible.builtin.copy:
    src: anvil-upgrade-notify
    dest: /usr/local/sbin/anvil-upgrade-notify
    owner: root
    group: root
    mode: "0755"

- name: "Updates | Notify-Service installieren"
  ansible.builtin.copy:
    src: anvil-upgrade-notify.service
    dest: /etc/systemd/system/anvil-upgrade-notify.service
    owner: root
    group: root
    mode: "0644"

- name: "Updates | Drop-in-Verzeichnis für apt-daily-upgrade.service"
  ansible.builtin.file:
    path: /etc/systemd/system/apt-daily-upgrade.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Updates | OnSuccess-Hook -> Gotify nach Upgrade-Lauf"
  ansible.builtin.copy:
    src: apt-daily-upgrade-onsuccess.conf
    dest: /etc/systemd/system/apt-daily-upgrade.service.d/anvil-onsuccess.conf
    owner: root
    group: root
    mode: "0644"

- name: "Updates | apt-daily-Timer aktivieren"
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
  when: not ansible_check_mode
