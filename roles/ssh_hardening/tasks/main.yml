---
# =============================================================================
# roles/ssh_hardening — SSH absichern (Root-/Passwort-Login aus, moderne Krypto)
#
# Sicherheitsnetz: Drop-in wird validiert, nur per RELOAD aktiviert, danach
# Self-Test. Bei ungültiger Konfiguration wird die Änderung zurückgenommen.
# =============================================================================

# include_tasks (dynamisch): im baseline wird mfa.yml gar nicht erst geladen,
# daher keine Template-Auswertung der mfa-Tasknamen/-Variablen.
- name: "SSH | MFA konfigurieren (crown_jewels-Posture)"
  ansible.builtin.include_tasks: mfa.yml
  when: anvil_crown_jewels | bool
  tags: [ssh, mfa]

- name: "SSH | openssh-server sicherstellen"
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [ssh]

- name: "SSH | Include der Drop-in-Verzeichnisse in sshd_config sicherstellen"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    line: "Include /etc/ssh/sshd_config.d/*.conf"
    insertbefore: BOF
    firstmatch: true
    validate: "sshd -t -f %s"
  tags: [ssh]

- name: "SSH | Warn-Banner /etc/issue.net"
  ansible.builtin.copy:
    src: issue.net
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"
  tags: [ssh]

- name: "SSH | Härtungs-Drop-in deployen (mit Validierung & Rollback)"
  tags: [ssh]
  block:
    - name: "SSH | Drop-in 00-anvil-hardening.conf schreiben"
      ansible.builtin.template:
        src: 00-anvil-hardening.conf.j2
        dest: /etc/ssh/sshd_config.d/00-anvil-hardening.conf
        owner: root
        group: root
        mode: "0600"
        validate: "sshd -t -f %s"
      notify: Reload sshd

    - name: "SSH | Gesamtkonfiguration prüfen (sshd -t)"
      ansible.builtin.command: sshd -t
      changed_when: false
  rescue:
    - name: "SSH | ROLLBACK — fehlerhaftes Drop-in entfernen"
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d/00-anvil-hardening.conf
        state: absent
    - name: "SSH | Abbruch wegen ungültiger sshd-Konfiguration"
      ansible.builtin.fail:
        msg: "sshd-Konfiguration ungültig — Drop-in wurde entfernt, SSH bleibt unverändert."

- name: "SSH | Reload jetzt ausführen (vor Self-Test)"
  ansible.builtin.meta: flush_handlers
  tags: [ssh]

# --- ssh.socket (Ubuntu 22.10+/24.04/26.04) ----------------------------------
# Bei socket-aktiviertem SSH bestimmt ssh.socket den Listen-Port — 'Port' in
# sshd_config wird IGNORIERT. Ein abweichender Port (ssh_port != 22) würde sonst
# nicht greifen und aussperren. Daher die Socket auf denselben Port ausrichten.
- name: "SSH | ssh.socket-Status ermitteln"  # noqa: command-instead-of-module
  ansible.builtin.command: systemctl is-active ssh.socket
  register: anvil_ssh_socket
  changed_when: false
  failed_when: false
  tags: [ssh]

- name: "SSH | ssh.socket auf Port {{ ssh_port }} ausrichten"
  when:
    - (anvil_ssh_socket.stdout | default('')) == 'active'
    - ssh_port | int != 22
    - not ansible_check_mode
  tags: [ssh]
  block:
    - name: "SSH | Drop-in-Verzeichnis für ssh.socket anlegen"
      ansible.builtin.file:
        path: /etc/systemd/system/ssh.socket.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "SSH | ssh.socket ListenStream auf konfigurierten Port setzen"
      ansible.builtin.copy:
        dest: /etc/systemd/system/ssh.socket.d/10-anvil-port.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Anvil-managed — Port der socket-aktivierten SSH.
          # Leeres ListenStream= setzt den geerbten Default (22) zurück,
          # danach wird der konfigurierte Port gebunden.
          [Socket]
          ListenStream=
          ListenStream={{ ssh_port }}
      register: anvil_ssh_socket_dropin

    - name: "SSH | systemd neu laden & ssh.socket auf neuen Port binden"
      ansible.builtin.systemd_service:
        name: ssh.socket
        state: restarted
        daemon_reload: true
      when: anvil_ssh_socket_dropin is changed

- name: "SSH | ssh.socket-Port-Override entfernen (Port wieder 22)"
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.socket.d/10-anvil-port.conf
    state: absent
  register: anvil_ssh_socket_revert
  when:
    - (anvil_ssh_socket.stdout | default('')) == 'active'
    - ssh_port | int == 22
  tags: [ssh]

- name: "SSH | ssh.socket nach Override-Entfernung neu binden"
  ansible.builtin.systemd_service:
    name: ssh.socket
    state: restarted
    daemon_reload: true
  when:
    - anvil_ssh_socket_revert is changed
    - not ansible_check_mode
  tags: [ssh]

# --- Self-Test ----------------------------------------------------------------
- name: "SSH | Self-Test: Dienst aktiv?"  # noqa: command-instead-of-module
  ansible.builtin.command: systemctl is-active ssh
  register: anvil_ssh_active
  changed_when: false
  failed_when: false
  when: not ansible_check_mode
  tags: [ssh]

- name: "SSH | Self-Test: lauscht sshd auf Port {{ ssh_port }}?"
  ansible.builtin.wait_for:
    port: "{{ ssh_port }}"
    host: 127.0.0.1
    timeout: 10
    state: started
  register: anvil_ssh_listen
  failed_when: false
  when: not ansible_check_mode
  tags: [ssh]

- name: "SSH | Self-Test-Ergebnis melden (ntfy bei Problem)"
  ansible.builtin.command:
    argv:
      - /usr/local/bin/anvil-notify
      - "--priority"
      - "{{ notify_priority_alert }}"
      - "--title"
      - "SSH-Self-Test fehlgeschlagen"
      - "sshd nach Härtung nicht aktiv/erreichbar auf Port {{ ssh_port }} — bitte prüfen!"
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - >-
      (anvil_ssh_listen.state | default('')) != 'started'
      or ((anvil_ssh_active.stdout | default('')) != 'active'
          and (anvil_ssh_socket.stdout | default('')) != 'active')
  tags: [ssh]

- name: "SSH | ✅ Gehärtet"
  ansible.builtin.debug:
    msg:
      - "SSH gehärtet: Root-Login={{ ssh_permit_root_login }}, PasswordAuth={{ ssh_password_authentication }}"
      - "Port={{ ssh_port }}, Dienst={{ anvil_ssh_active.stdout | default('check-mode') }}"
  tags: [ssh]
