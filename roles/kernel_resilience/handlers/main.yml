---
- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false
  when: not ansible_check_mode

- name: Update grub
  ansible.builtin.command: update-grub
  changed_when: false
  when: not ansible_check_mode

- name: Reexec systemd
  ansible.builtin.systemd_service:
    daemon_reexec: true
  when: not ansible_check_mode

- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: not ansible_check_mode
