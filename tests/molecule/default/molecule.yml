---
# Optionaler Molecule-Test (Docker). Voraussetzung: molecule + molecule-plugins[docker].
# Ausführen: cd tests/molecule/default && molecule test
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: anvil-debian12
    image: geerlingguy/docker-debian12-ansible:latest
    command: /usr/lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: anvil-ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: /usr/lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  inventory:
    host_vars:
      anvil-debian12:
        ansible_connection: docker
verifier:
  name: ansible
